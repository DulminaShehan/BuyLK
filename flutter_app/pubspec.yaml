name: buylk
description: BuyLK eCommerce mobile application.
environment:
  sdk: '>=3.3.0 <4.0.0'
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.9
  flutter_riverpod: ^2.4.0
  go_router: ^14.2.0
  dio: ^5.0.1
  shared_preferences: ^2.0.0
  flutter_secure_storage: ^9.0.0
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  google_sign_in: ^6.0.0
  google_fonts: ^6.0.0
  intl: ^0.19.0
  cached_network_image: ^3.0.0
  shimmer: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
